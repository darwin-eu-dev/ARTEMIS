url: https://ohdsi.github.io/ARTEMIS/

template:
  bootstrap: 5
  params:
    bootswatch: cosmo
  light-switch: true

resources:
  - vignettes/images

development:
  mode: auto
  development: docs/dev

home:
  links:
    - text: Ask a question
      href: http://forums.ohdsi.org

articles:
  - title: internal
    contents:
      - starts_with("maintainers/")

  - title: Articles
    navbar: ~
    contents:
      - starts_with("")
      - starts_with("maintainers/")

navbar:
  structure:
    left:
      - home
      - intro
      - reference
      - articles
      - news
    right: [hades, github]
  components:
    home:
      icon: fa-home fa-lg
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
