name: build-and-push-container-arm64

# Builds the ARTEMIS image for linux/arm64 on a native arm64 runner using plain
# `docker build` (no buildx/QEMU emulation, which is far faster) and pushes it to
# the onconet Azure Container Registry with an "-arm64" tag suffix. The amd64
# image is built by the companion build-and-push-container-amd64 workflow.
#
# Required GitHub Actions secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#       - OIDC (federated) login to Azure; no Azure password is stored.
#   GH_PAT
#       - GitHub PAT with read access to the private darwin-eu-studies/P4-C5-006
#         repo; the Dockerfile installs it via a BuildKit secret (id=github_pat).
#         GitHub forbids secret names starting with "GITHUB_", hence GH_PAT.
#
# Azure setup: the identity behind AZURE_CLIENT_ID must have a federated
# credential trusting this repo (and the triggering ref/environment), and must
# hold the AcrPush role on the onconet registry.

on:
  # Publish on a GitHub Release, and allow manual runs with an optional tag.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Base image tag for manual runs (default: manual-<run_number>)"
        required: false
        default: ""

# OIDC needs id-token: write to mint the federated token; contents: read to checkout.
permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: onconet
  REGISTRY: onconet-thg9fxc7hxgvc6ga.azurecr.io
  IMAGE_NAME: artemis
  ARCH: arm64

jobs:
  build-push-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tag selection (each tag carries an -arm64 suffix):
      #   release    -> <release tag>-arm64  and  latest-arm64
      #   manual run -> <input tag>-arm64, or manual-<run_number>-arm64 if blank
      - name: Determine tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            BASE="${{ github.event.release.tag_name }}"
            echo "tag1=${REGISTRY}/${IMAGE_NAME}:${BASE}-${ARCH}" >> "$GITHUB_OUTPUT"
            echo "tag2=${REGISTRY}/${IMAGE_NAME}:latest-${ARCH}" >> "$GITHUB_OUTPUT"
          else
            BASE="${{ github.event.inputs.tag }}"
            [ -z "${BASE}" ] && BASE="manual-${{ github.run_number }}"
            echo "tag1=${REGISTRY}/${IMAGE_NAME}:${BASE}-${ARCH}" >> "$GITHUB_OUTPUT"
            echo "tag2=" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push (arm64)
        env:
          TAG1: ${{ steps.tags.outputs.tag1 }}
          TAG2: ${{ steps.tags.outputs.tag2 }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          DOCKER_BUILDKIT: "1"  # required for the Dockerfile's BuildKit secret mount
        run: |
          docker build \
            --file ./Dockerfile \
            --secret id=github_pat,env=GITHUB_PAT \
            --tag "${TAG1}" \
            .
          docker push "${TAG1}"
          if [ -n "${TAG2}" ]; then
            docker tag "${TAG1}" "${TAG2}"
            docker push "${TAG2}"
          fi
